name: Build and Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install npm dependencies (if present)
        run: |
          if [ -f package-lock.json ]; then npm ci --no-audit --prefer-offline; elif [ -f yarn.lock ]; then npm install --no-audit --prefer-offline; else echo "No Node lockfile found — skipping npm install"; fi

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Make run script executable
        run: chmod +x ./run || true

      - name: Build site using run build
        run: ./run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload generated site
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: "github-pages"
      url: ${{ steps.deployment.outputs.page_url }}    
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
